<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- White coloring page background with slight border -->
  <rect width="32" height="32" rx="6" fill="white"/>
  <rect width="32" height="32" rx="6" fill="none" stroke="#e0d8cc" stroke-width="1.5"/>
  <!-- Stem -->
  <line x1="16" y1="27" x2="16" y2="20" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Petals -->
  <ellipse cx="16" cy="11" rx="2.5" ry="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="16" cy="11" rx="2.5" ry="5" fill="none" stroke="#333" stroke-width="1.5" transform="rotate(45 16 16)"/>
  <ellipse cx="16" cy="11" rx="2.5" ry="5" fill="none" stroke="#333" stroke-width="1.5" transform="rotate(90 16 16)"/>
  <ellipse cx="16" cy="11" rx="2.5" ry="5" fill="none" stroke="#333" stroke-width="1.5" transform="rotate(135 16 16)"/>
  <!-- Center -->
  <circle cx="16" cy="16" r="3.5" fill="white" stroke="#333" stroke-width="1.5"/>
</svg>
